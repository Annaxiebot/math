<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Quest - Learn & Practice!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2vmin;
            overflow-x: hidden;
        }
        
        .container {
            background: white;
            border-radius: 3vmin;
            padding: 4vmin;
            box-shadow: 0 2vmin 6vmin rgba(0,0,0,0.3);
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: #667eea;
            font-size: clamp(2rem, 6vmin, 4rem);
            margin-bottom: 1vmin;
            text-align: center;
            font-weight: bold;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 3vmin;
            font-size: clamp(1rem, 2.5vmin, 1.5rem);
            text-align: center;
        }
        
        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 3vmin;
            padding: 3vmin;
            background: #f0f4ff;
            border-radius: 2vmin;
            gap: 2vmin;
        }
        
        .score-item {
            text-align: center;
            flex: 1;
        }
        
        .score-label {
            color: #666;
            font-size: clamp(0.9rem, 2vmin, 1.2rem);
            margin-bottom: 1vmin;
        }
        
        .score-value {
            font-size: clamp(1.5rem, 5vmin, 3rem);
            font-weight: bold;
            color: #667eea;
        }
        
        .explanation-box {
            background: #fff9e6;
            padding: 3vmin;
            border-radius: 2vmin;
            margin-bottom: 3vmin;
            border: 0.5vmin solid #ffd700;
        }
        
        .concept-title {
            font-size: clamp(1.2rem, 3.5vmin, 2rem);
            color: #764ba2;
            margin-bottom: 2vmin;
            font-weight: bold;
        }
        
        .concept-text {
            font-size: clamp(1rem, 2.5vmin, 1.4rem);
            color: #333;
            line-height: 1.5;
            margin-bottom: 2vmin;
        }
        
        .visual-demo {
            background: white;
            padding: 3vmin;
            border-radius: 2vmin;
            margin: 2vmin 0;
            text-align: center;
        }
        
        .visual-demo p {
            font-size: clamp(1rem, 2.5vmin, 1.3rem);
            margin: 1vmin 0;
        }
        
        .blocks {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1vmin;
            margin: 2vmin 0;
        }
        
        .block {
            width: clamp(25px, 4vmin, 50px);
            height: clamp(25px, 4vmin, 50px);
            background: #667eea;
            border-radius: 1vmin;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .block.removing {
            background: #ffcccb;
            opacity: 0.3;
        }
        
        .question-box {
            background: #e8f5e9;
            padding: 4vmin;
            border-radius: 2vmin;
            margin-bottom: 3vmin;
            font-size: clamp(2rem, 8vmin, 5rem);
            font-weight: bold;
            color: #333;
            text-align: center;
            border: 0.5vmin solid #4caf50;
            min-height: 15vmin;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .answer-section {
            text-align: center;
            margin-bottom: 3vmin;
        }
        
        .answer-input {
            font-size: clamp(2rem, 6vmin, 4rem);
            padding: 2vmin 3vmin;
            border: 0.5vmin solid #667eea;
            border-radius: 2vmin;
            text-align: center;
            width: min(200px, 40vw);
            margin: 0 auto;
            display: block;
            font-weight: bold;
        }
        
        .answer-input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 2vmin rgba(102, 126, 234, 0.5);
        }
        
        .button-group {
            display: flex;
            gap: 2vmin;
            justify-content: center;
            flex-wrap: wrap;
            margin: 3vmin 0;
        }
        
        .btn {
            font-size: clamp(1.2rem, 3.5vmin, 2rem);
            padding: 3vmin 6vmin;
            border: none;
            border-radius: 2vmin;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            min-width: 200px;
            flex: 1;
            max-width: 400px;
            touch-action: manipulation;
        }
        
        .btn:hover, .btn:focus {
            transform: translateY(-0.5vmin);
            box-shadow: 0 1vmin 3vmin rgba(0,0,0,0.2);
            outline: 0.4vmin solid rgba(102, 126, 234, 0.5);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-submit {
            background: #667eea;
            color: white;
        }
        
        .btn-next {
            background: #4caf50;
            color: white;
        }
        
        .feedback {
            font-size: clamp(1.2rem, 4vmin, 2rem);
            font-weight: bold;
            text-align: center;
            min-height: 8vmin;
            margin: 3vmin 0;
            line-height: 1.4;
        }
        
        .correct {
            color: #4caf50;
        }
        
        .incorrect {
            color: #f44336;
        }
        
        .stars {
            font-size: clamp(2rem, 6vmin, 4rem);
            margin-top: 2vmin;
            text-align: center;
        }
        
        .hidden {
            display: none;
        }
        
        /* TV-specific optimizations */
        @media (min-width: 1200px) {
            body {
                padding: 3vmin;
            }
            
            .container {
                padding: 5vmin;
            }
            
            .btn:focus {
                outline: 0.6vmin solid #ffd700;
            }
        }
        
        /* Phone-specific optimizations */
        @media (max-width: 600px) {
            .score-board {
                padding: 2vmin;
            }
            
            .explanation-box {
                padding: 3vmin;
            }
            
            .btn {
                min-width: 150px;
                padding: 3vmin 4vmin;
            }
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .animate {
            animation: bounce 0.5s;
        }
        
        /* Focus visible for keyboard/remote navigation */
        *:focus-visible {
            outline: 0.5vmin solid #ffd700;
            outline-offset: 0.5vmin;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌟 Math Quest 🌟</h1>
        <p class="subtitle">Learn the concepts, practice the skills!</p>
        
        <div class="score-board">
            <div class="score-item">
                <div class="score-label">Correct</div>
                <div class="score-value" id="correct">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Streak</div>
                <div class="score-value" id="streak">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Total</div>
                <div class="score-value" id="total">0</div>
            </div>
        </div>
        
        <div id="explanation" class="explanation-box">
            <div class="concept-title" id="conceptTitle"></div>
            <div class="concept-text" id="conceptText"></div>
            <div class="visual-demo" id="visualDemo"></div>
        </div>
        
        <div class="question-box" id="question"></div>
        
        <div class="answer-section">
            <input type="number" 
                   class="answer-input" 
                   id="answer" 
                   placeholder="?" 
                   autocomplete="off"
                   inputmode="numeric"
                   pattern="[0-9]*">
        </div>
        
        <div class="button-group">
            <button class="btn btn-submit" id="submitBtn" onclick="checkAnswer()">
                Check Answer ✓
            </button>
            <button class="btn btn-next hidden" id="nextBtn" onclick="nextQuestion()">
                Next Problem →
            </button>
        </div>
        
        <div class="feedback" id="feedback"></div>
        <div class="stars" id="stars"></div>
    </div>

    <script>
        let correct = 0;
        let total = 0;
        let streak = 0;
        let currentAnswer = 0;
        let currentOperation = '+';
        let num1 = 0;
        let num2 = 0;
        
        const concepts = {
            addition: {
                title: "✨ Addition: Putting Things Together",
                text: "When we <strong>add</strong>, we combine two groups to make a bigger group. The symbol + means 'plus' or 'and'. Example: If you have 3 apples and get 2 more, you now have 5 apples total!"
            },
            subtraction: {
                title: "✂️ Subtraction: Taking Things Away",
                text: "When we <strong>subtract</strong>, we take away from a group to make it smaller. The symbol − means 'minus' or 'take away'. Example: If you have 8 cookies and eat 3, you have 5 cookies left!"
            }
        };
        
        const encouragement = {
            correct: [
                "Amazing! You got it! ⭐",
                "Fantastic work! 🎉",
                "Perfect! You understand! 🌟",
                "You're a math star! ✨",
                "Brilliant thinking! 🎊"
            ],
            incorrect: [
                "Not quite, but great try! 💪",
                "Let's think through it together! 🎯",
                "Good effort! Try the next one! 🌈"
            ]
        };
        
        function createBlocks(count, removing = 0) {
            let html = '<div class="blocks">';
            for (let i = 0; i < count; i++) {
                const isRemoving = i >= (count - removing);
                html += `<div class="block ${isRemoving ? 'removing' : ''}"></div>`;
            }
            html += '</div>';
            return html;
        }
        
        function generateQuestion() {
            const operations = ['+', '-'];
            currentOperation = operations[Math.floor(Math.random() * operations.length)];
            
            const explanationBox = document.getElementById('explanation');
            const conceptTitle = document.getElementById('conceptTitle');
            const conceptText = document.getElementById('conceptText');
            const visualDemo = document.getElementById('visualDemo');
            
            if (currentOperation === '+') {
                num1 = Math.floor(Math.random() * 10) + 1;
                num2 = Math.floor(Math.random() * 10) + 1;
                currentAnswer = num1 + num2;
                
                conceptTitle.innerHTML = concepts.addition.title;
                conceptText.innerHTML = concepts.addition.text;
                
                visualDemo.innerHTML = `
                    <p style="font-weight: bold; margin-bottom: 2vmin;">
                        Visual Example: ${num1} + ${num2}
                    </p>
                    <p>Start with ${num1} blocks:</p>
                    ${createBlocks(num1)}
                    <p style="margin: 2vmin 0; font-weight: bold;">➕ Add ${num2} more blocks:</p>
                    ${createBlocks(num2)}
                    <p style="margin: 2vmin 0; font-weight: bold;">= ${num1} + ${num2} blocks total</p>
                    <p style="color: #667eea; font-weight: bold;">Count all the blocks to find the answer!</p>
                `;
                
            } else {
                num1 = Math.floor(Math.random() * 15) + 6;
                num2 = Math.floor(Math.random() * (num1 - 1)) + 1;
                currentAnswer = num1 - num2;
                
                conceptTitle.innerHTML = concepts.subtraction.title;
                conceptText.innerHTML = concepts.subtraction.text;
                
                visualDemo.innerHTML = `
                    <p style="font-weight: bold; margin-bottom: 2vmin;">
                        Visual Example: ${num1} − ${num2}
                    </p>
                    <p>Start with ${num1} blocks:</p>
                    ${createBlocks(num1, num2)}
                    <p style="margin: 2vmin 0; font-weight: bold;">➖ Take away ${num2} blocks (shown faded):</p>
                    <p style="margin: 2vmin 0; font-weight: bold;">= ${num1} − ${num2} blocks remaining</p>
                    <p style="color: #667eea; font-weight: bold;">Count only the solid blocks to find the answer!</p>
                `;
            }
            
            document.getElementById('question').textContent = `${num1} ${currentOperation} ${num2} = ?`;
            document.getElementById('answer').value = '';
            document.getElementById('feedback').textContent = '';
            document.getElementById('stars').textContent = '';
            document.getElementById('answer').focus();
            document.getElementById('submitBtn').classList.remove('hidden');
            document.getElementById('nextBtn').classList.add('hidden');
        }
        
        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById('answer').value);
            
            if (isNaN(userAnswer)) {
                return;
            }
            
            total++;
            
            const feedbackEl = document.getElementById('feedback');
            const starsEl = document.getElementById('stars');
            const submitBtn = document.getElementById('submitBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            if (userAnswer === currentAnswer) {
                correct++;
                streak++;
                
                feedbackEl.innerHTML = `
                    ${encouragement.correct[Math.floor(Math.random() * encouragement.correct.length)]}<br>
                    <span style="font-size: 0.7em;">
                        Yes! ${num1} ${currentOperation} ${num2} = ${currentAnswer}
                    </span>
                `;
                feedbackEl.className = 'feedback correct animate';
                
                let starCount = Math.min(streak, 5);
                starsEl.textContent = '⭐'.repeat(starCount);
                
            } else {
                streak = 0;
                
                let explanation = '';
                if (currentOperation === '+') {
                    explanation = `When we add ${num1} and ${num2}, we're combining ${num1} things with ${num2} more things.`;
                } else {
                    explanation = `When we subtract ${num2} from ${num1}, we're taking ${num2} things away from ${num1} things.`;
                }
                
                feedbackEl.innerHTML = `
                    ${encouragement.incorrect[Math.floor(Math.random() * encouragement.incorrect.length)]}<br>
                    <span style="font-size: 0.7em;">
                        ${explanation}<br>
                        The answer is ${currentAnswer}. Look at the blocks above!
                    </span>
                `;
                feedbackEl.className = 'feedback incorrect';
                starsEl.textContent = '';
            }
            
            updateScores();
            submitBtn.classList.add('hidden');
            nextBtn.classList.remove('hidden');
            nextBtn.focus();
        }
        
        function nextQuestion() {
            generateQuestion();
        }
        
        function updateScores() {
            document.getElementById('correct').textContent = correct;
            document.getElementById('total').textContent = total;
            document.getElementById('streak').textContent = streak;
        }
        
        // Enter key to submit
        document.getElementById('answer').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const submitBtn = document.getElementById('submitBtn');
                const nextBtn = document.getElementById('nextBtn');
                
                if (!submitBtn.classList.contains('hidden')) {
                    checkAnswer();
                } else if (!nextBtn.classList.contains('hidden')) {
                    nextQuestion();
                }
            }
        });
        
        // Prevent zoom on double tap (iOS)
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
        
        // Start the game
        generateQuestion();
    </script>
</body>
</html>
