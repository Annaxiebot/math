<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mickey's Math Quest - Grade 6</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #FF0000 0%, #000000 100%);
            min-height: 100vh;
            padding: 2vmin;
            overflow-x: hidden;
        }
        
        .container {
            background: #FFF8DC;
            border-radius: 3vmin;
            padding: 4vmin;
            box-shadow: 0 2vmin 6vmin rgba(0,0,0,0.5);
            max-width: 1400px;
            margin: 0 auto;
            border: 1vmin solid #FFD700;
        }
        
        h1 {
            color: #FF0000;
            font-size: clamp(2rem, 6vmin, 4rem);
            margin-bottom: 1vmin;
            text-align: center;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            color: #333;
            margin-bottom: 3vmin;
            font-size: clamp(1rem, 2.5vmin, 1.5rem);
            text-align: center;
            font-weight: bold;
        }
        
        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 3vmin;
            padding: 3vmin;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border-radius: 2vmin;
            gap: 2vmin;
            border: 0.5vmin solid #FF0000;
        }
        
        .score-item {
            text-align: center;
            flex: 1;
        }
        
        .score-label {
            color: #000;
            font-size: clamp(0.9rem, 2vmin, 1.2rem);
            margin-bottom: 1vmin;
            font-weight: bold;
        }
        
        .score-value {
            font-size: clamp(1.5rem, 5vmin, 3rem);
            font-weight: bold;
            color: #FF0000;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }
        
        .explanation-box {
            background: white;
            padding: 3vmin;
            border-radius: 2vmin;
            margin-bottom: 3vmin;
            border: 0.5vmin solid #FF0000;
        }
        
        .concept-title {
            font-size: clamp(1.2rem, 3.5vmin, 2rem);
            color: #FF0000;
            margin-bottom: 2vmin;
            font-weight: bold;
        }
        
        .concept-text {
            font-size: clamp(1rem, 2.5vmin, 1.4rem);
            color: #333;
            line-height: 1.6;
            margin-bottom: 2vmin;
        }
        
        .formula-box {
            background: #FFD700;
            padding: 2vmin;
            border-radius: 1.5vmin;
            margin: 2vmin 0;
            font-size: clamp(1.1rem, 3vmin, 1.6rem);
            font-weight: bold;
            text-align: center;
            border: 0.3vmin solid #FF0000;
            color: #000;
        }
        
        .steps {
            background: #f0f0f0;
            padding: 2vmin;
            border-radius: 1.5vmin;
            margin: 2vmin 0;
        }
        
        .step {
            font-size: clamp(1rem, 2.5vmin, 1.3rem);
            padding: 1vmin;
            margin: 1vmin 0;
            color: #333;
            line-height: 1.5;
        }
        
        .question-box {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            padding: 4vmin;
            border-radius: 2vmin;
            margin-bottom: 3vmin;
            font-size: clamp(1.8rem, 6vmin, 4rem);
            font-weight: bold;
            color: #000;
            text-align: center;
            border: 0.5vmin solid #FF0000;
            min-height: 15vmin;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .answer-section {
            text-align: center;
            margin-bottom: 3vmin;
        }
        
        .answer-input {
            font-size: clamp(2rem, 6vmin, 4rem);
            padding: 2vmin 3vmin;
            border: 0.5vmin solid #FF0000;
            border-radius: 2vmin;
            text-align: center;
            width: min(300px, 50vw);
            margin: 0 auto;
            display: block;
            font-weight: bold;
            background: white;
        }
        
        .answer-input:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 2vmin rgba(255, 215, 0, 0.8);
        }
        
        .button-group {
            display: flex;
            gap: 2vmin;
            justify-content: center;
            flex-wrap: wrap;
            margin: 3vmin 0;
        }
        
        .btn {
            font-size: clamp(1.2rem, 3.5vmin, 2rem);
            padding: 3vmin 6vmin;
            border: 0.5vmin solid #000;
            border-radius: 2vmin;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            min-width: 200px;
            flex: 1;
            max-width: 400px;
            touch-action: manipulation;
        }
        
        .btn:hover, .btn:focus {
            transform: translateY(-0.5vmin);
            box-shadow: 0 1vmin 3vmin rgba(0,0,0,0.3);
            outline: 0.4vmin solid #FFD700;
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-submit {
            background: #FF0000;
            color: white;
        }
        
        .btn-next {
            background: #FFD700;
            color: #000;
        }
        
        .feedback {
            font-size: clamp(1.2rem, 4vmin, 2rem);
            font-weight: bold;
            text-align: center;
            min-height: 8vmin;
            margin: 3vmin 0;
            line-height: 1.4;
        }
        
        .correct {
            color: #008000;
        }
        
        .incorrect {
            color: #FF0000;
        }
        
        .stars {
            font-size: clamp(2rem, 6vmin, 4rem);
            margin-top: 2vmin;
            text-align: center;
        }
        
        .hidden {
            display: none;
        }
        
        .topic-selector {
            display: flex;
            gap: 1vmin;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 3vmin;
        }
        
        .topic-btn {
            padding: 2vmin 3vmin;
            background: white;
            border: 0.3vmin solid #FF0000;
            border-radius: 1.5vmin;
            cursor: pointer;
            font-size: clamp(0.9rem, 2vmin, 1.2rem);
            font-weight: bold;
            color: #000;
            transition: all 0.2s;
        }
        
        .topic-btn.active {
            background: #FF0000;
            color: white;
        }
        
        .topic-btn:hover {
            background: #FFD700;
        }
        
        @media (min-width: 1200px) {
            body {
                padding: 3vmin;
            }
            
            .container {
                padding: 5vmin;
            }
            
            .btn:focus {
                outline: 0.6vmin solid #FFD700;
            }
        }
        
        @media (max-width: 600px) {
            .score-board {
                padding: 2vmin;
            }
            
            .btn {
                min-width: 150px;
                padding: 3vmin 4vmin;
            }
            
            .topic-selector {
                gap: 1.5vmin;
            }
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .animate {
            animation: bounce 0.5s;
        }
        
        .loading-pulse {
            animation: pulse 1.5s infinite;
        }
        
        *:focus-visible {
            outline: 0.5vmin solid #FFD700;
            outline-offset: 0.5vmin;
        }
        
        .tutor-section {
            display: none;
            margin-top: 3vmin;
        }
        
        .tutor-section.show {
            display: block;
        }
        
        .practice-section {
            display: block;
        }
        
        .practice-section.hidden {
            display: none;
        }
        
        .tutor-content {
            background: #FFF8DC;
            border-radius: 3vmin;
            padding: 4vmin;
            border: 1vmin solid #FFD700;
            margin-bottom: 3vmin;
        }
        
        .tutor-header {
            text-align: center;
            margin-bottom: 3vmin;
        }
        
        .tutor-header h2 {
            color: #FF0000;
            font-size: clamp(1.5rem, 4vmin, 2.5rem);
            margin-bottom: 1vmin;
        }
        
        .tutor-input-group {
            margin-bottom: 3vmin;
        }
        
        .tutor-label {
            display: block;
            font-size: clamp(1rem, 2.5vmin, 1.3rem);
            font-weight: bold;
            color: #333;
            margin-bottom: 1vmin;
        }
        
        .tutor-textarea {
            width: 100%;
            min-height: 20vmin;
            font-size: clamp(1rem, 2.5vmin, 1.2rem);
            padding: 2vmin;
            border: 0.5vmin solid #FF0000;
            border-radius: 1.5vmin;
            font-family: inherit;
            resize: vertical;
        }
        
        .tutor-response {
            background: linear-gradient(135deg, #FFF8DC 0%, #FFFACD 100%);
            padding: 4vmin;
            border-radius: 2vmin;
            border: 0.5vmin solid #FF0000;
            margin: 2vmin 0;
            font-size: clamp(1.1rem, 2.8vmin, 1.5rem);
            line-height: 1.8;
            max-height: 60vmin;
            overflow-y: auto;
            box-shadow: 0 0.5vmin 2vmin rgba(255, 0, 0, 0.2);
        }
        
        .tutor-response h3 {
            color: #FF0000;
            margin: 2vmin 0 1vmin 0;
            font-size: clamp(1.3rem, 3.2vmin, 1.8rem);
        }
        
        .tutor-response strong {
            color: #FF0000;
        }
        
        .tutor-response p {
            margin: 1.5vmin 0;
        }
        
        .tutor-response ol, .tutor-response ul {
            margin-left: 3vmin;
            margin-top: 1vmin;
            margin-bottom: 1vmin;
        }
        
        .tutor-response li {
            margin: 1vmin 0;
        }
        
        .tutor-loading {
            text-align: center;
            padding: 3vmin;
            font-size: clamp(1.2rem, 3vmin, 1.5rem);
            color: #FF0000;
        }
        
        .btn-tutor {
            background: #FFD700;
            color: #000;
            border: 0.5vmin solid #FF0000;
        }
        
        .btn-close {
            background: #666;
            color: white;
        }
        
        .tutor-examples {
            font-size: clamp(0.9rem, 2vmin, 1.1rem);
            color: #666;
            margin-top: 1vmin;
            font-style: italic;
        }
        
        .api-warning {
            background: #fff3cd;
            border: 0.3vmin solid #ffc107;
            padding: 2vmin;
            border-radius: 1.5vmin;
            margin-bottom: 2vmin;
            font-size: clamp(0.9rem, 2vmin, 1.1rem);
            color: #856404;
        }
    </style>
</head>
<body>

    
    <div class="container">
        <h1>🎀 Mickey's Math Quest 🎀</h1>
        <div style="text-align: center; margin-bottom: 3vmin;">
            <div style="margin-bottom: 2vmin;">
                <label style="font-size: clamp(1rem, 2.5vmin, 1.3rem); font-weight: bold; margin-right: 2vmin;">
                    Grade Level:
                </label>
                <select id="gradeLevel" style="font-size: clamp(1rem, 2.5vmin, 1.3rem); padding: 1vmin 2vmin; border-radius: 1vmin; border: 0.3vmin solid #FF0000; background: white;">
                    <option value="3">Grade 3</option>
                    <option value="4">Grade 4</option>
                    <option value="5">Grade 5</option>
                    <option value="6" selected>Grade 6</option>
                    <option value="7">Grade 7</option>
                    <option value="8">Grade 8</option>
                </select>
            </div>
            
            <div style="margin-bottom: 2vmin;">
                <label style="font-size: clamp(1rem, 2.5vmin, 1.3rem); font-weight: bold; margin-right: 2vmin;">
                    Story Context:
                </label>
                <select id="storyContext" style="font-size: clamp(1rem, 2.5vmin, 1.3rem); padding: 1vmin 2vmin; border-radius: 1vmin; border: 0.3vmin solid #FF0000; background: white;">
                    <option value="mickey" selected>Mickey Mouse Adventures 🎀</option>
                    <option value="space">Space & Rockets 🚀</option>
                    <option value="sports">Sports & Games ⚽</option>
                    <option value="cooking">Cooking & Food 🍕</option>
                    <option value="animals">Animals & Nature 🦁</option>
                    <option value="superheroes">Superheroes 🦸</option>
                    <option value="minecraft">Minecraft & Gaming 🎮</option>
                    <option value="custom">Custom (type below) ✏️</option>
                </select>
            </div>
            
            <div id="customContextDiv" style="display: none; margin-top: 2vmin;">
                <input type="text" id="customContext" placeholder="Describe your story context... (e.g., pirates, dinosaurs, cars)" 
                    style="font-size: clamp(1rem, 2.5vmin, 1.2rem); padding: 1.5vmin; border-radius: 1vmin; border: 0.3vmin solid #FFD700; width: min(400px, 80%); text-align: center;">
            </div>
        </div>
        
        <div class="topic-selector">
            <button class="topic-btn active" onclick="changeTopic('equations')">Equations</button>
            <button class="topic-btn" onclick="changeTopic('slope')">Slope & Lines</button>
            <button class="topic-btn" onclick="changeTopic('order')">Order of Operations</button>
            <button class="topic-btn" onclick="changeTopic('fractions')">Fractions</button>
            <button class="topic-btn" onclick="changeTopic('area')">Area & Perimeter</button>
            <button class="topic-btn" style="background: #FFD700; border-color: #FF0000;" onclick="toggleTutorMode()">
                🎓 Ask AI Tutor Mickey
            </button>
        </div>
        
        <!-- Practice Section (default questions) -->
        <div id="practiceSection" class="practice-section">
        
        <div class="score-board">
            <div class="score-item">
                <div class="score-label">Correct</div>
                <div class="score-value" id="correct">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Streak</div>
                <div class="score-value" id="streak">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Total</div>
                <div class="score-value" id="total">0</div>
            </div>
        </div>
        
        <div id="explanation" class="explanation-box">
            <div class="concept-title" id="conceptTitle"></div>
            <div class="concept-text" id="conceptText"></div>
            <div id="formulaBox" class="formula-box"></div>
            <div id="stepsBox" class="steps"></div>
        </div>
        
        <div class="question-box" id="question"></div>
        
        <div class="answer-section">
            <input type="text" 
                   class="answer-input" 
                   id="answer" 
                   placeholder="?" 
                   autocomplete="off">
        </div>
        
        <div class="button-group">
            <button class="btn btn-submit" id="submitBtn" onclick="checkAnswer()">
                Check Answer ✓
            </button>
            <button class="btn btn-next hidden" id="nextBtn" onclick="nextQuestion()">
                Next Problem →
            </button>
        </div>
        
        <div class="feedback" id="feedback"></div>
        <div class="stars" id="stars"></div>
        </div>
        
        <!-- AI Tutor Section -->
        <div id="tutorSection" class="tutor-section">
            <div class="tutor-content">
                <div class="tutor-header">
                    <h2 style="color: #FF0000; text-align: center; margin-bottom: 2vmin;">🎀 Ask AI Tutor Mickey! 🎀</h2>
                    <p style="font-size: clamp(0.9rem, 2vmin, 1.1rem); color: #666; text-align: center;">
                        Ask me for custom math practice problems OR customize the app!
                    </p>
                    <div style="text-align: center; margin-bottom: 2vmin;">
                        <button class="topic-btn" onclick="showVibeCodingHelp()" style="background: #FFD700; font-size: clamp(0.9rem, 2vmin, 1.1rem);">
                            🎨 Vibe Coding Help
                        </button>
                    </div>
                </div>
                
                <div class="tutor-input-group">
                    <label class="tutor-label" for="tutorQuestion">
                        What kind of math problems do you want to practice?
                    </label>
                    <textarea 
                        id="tutorQuestion" 
                        class="tutor-textarea" 
                        placeholder="Example: Give me 3 slope problems with positive slopes..."
                    ></textarea>
                    <div class="tutor-examples">
                        💡 <strong>Math:</strong> "Give me equations with fractions"<br>
                        🎨 <strong>Vibe Coding:</strong> "Make the background purple" or "Change the emoji to 🌟"
                    </div>
                </div>
                
                <div id="tutorResponse" class="tutor-response hidden"></div>
                <div id="tutorLoading" class="tutor-loading hidden">
                    <div style="font-size: clamp(3rem, 6vmin, 5rem); animation: bounce 1s infinite;">🤔</div>
                    <div style="margin-top: 2vmin;">Mickey is thinking...</div>
                </div>
                
                <div class="button-group">
                    <button class="btn btn-tutor" onclick="askTutor()">
                        Ask Mickey! 🎓
                    </button>
                    <button class="btn btn-next" onclick="toggleTutorMode()">
                        ← Back to Practice
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let correct = 0;
        let total = 0;
        let streak = 0;
        let currentAnswer = 0;
        let currentTopic = 'equations';
        
        const topics = {
            equations: {
                name: "Solving Equations",
                prompt: "Create 1 equation problem for practice. Include step-by-step solution. Make it appropriate for the student's grade level."
            },
            slope: {
                name: "Slope & Linear Equations",
                prompt: "Create 1 slope or linear equation problem. Show the formula and step-by-step solution."
            },
            order: {
                name: "Order of Operations",
                prompt: "Create 1 order of operations (BEDMAS/PEMDAS) problem. Show step-by-step solution."
            },
            fractions: {
                name: "Fractions",
                prompt: "Create 1 fraction problem (adding, subtracting, multiplying, or dividing). Show step-by-step solution."
            },
            area: {
                name: "Area & Perimeter",
                prompt: "Create 1 area or perimeter problem with a shape. Show the formula and step-by-step solution."
            }
        };
        
        const encouragement = {
            correct: [
                "Hot dog! You got it! 🎉",
                "Oh boy! That's correct! ⭐",
                "Gosh! Perfect answer! 🌟",
                "Wonderful! Mickey's proud! ✨",
                "Aw shucks! You're a star! 🎊"
            ],
            incorrect: [
                "Gee, not quite! Let's try again! 💪",
                "Aw, good try! Check the steps! 🎯",
                "Don't worry! Practice makes perfect! 🌈"
            ]
        };
        
        async function changeTopic(topic) {
            currentTopic = topic;
            document.querySelectorAll('.topic-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Show loading animation
            const questionBox = document.getElementById('question');
            const feedbackEl = document.getElementById('feedback');
            const starsEl = document.getElementById('stars');
            const explanationBox = document.getElementById('explanation');
            
            // Show Mickey thinking animation
            explanationBox.innerHTML = `
                <div style="text-align: center; padding: 4vmin;">
                    <div style="font-size: clamp(3rem, 8vmin, 6rem); animation: bounce 1s infinite;">🤔</div>
                    <div style="font-size: clamp(1.2rem, 3vmin, 1.8rem); color: #FF0000; font-weight: bold; margin-top: 2vmin;">
                        Mickey is creating your problem...
                    </div>
                    <div style="font-size: clamp(1rem, 2.5vmin, 1.3rem); color: #666; margin-top: 1vmin;">
                        Thinking of a fun ${topics[topic].name} problem! 💭
                    </div>
                </div>
            `;
            
            questionBox.textContent = '';
            feedbackEl.textContent = '';
            starsEl.textContent = '';
            document.getElementById('answer').value = '';
            
            await generateAIProblem(topic);
        }
        
        function generateEquation() {
            const types = ['oneStep', 'twoStep', 'distributive'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            let equation, solution, steps;
            
            if (type === 'oneStep') {
                const x = Math.floor(Math.random() * 15) + 1;
                const b = Math.floor(Math.random() * 20) + 1;
                const operation = Math.random() > 0.5 ? '+' : '-';
                
                if (operation === '+') {
                    equation = `x + ${b} = ${x + b}`;
                    solution = x;
                    steps = `
                        <div class="step"><strong>Step 1:</strong> Isolate x by doing the opposite operation</div>
                        <div class="step"><strong>Step 2:</strong> Since we're adding ${b}, we subtract ${b} from both sides</div>
                        <div class="step"><strong>Step 3:</strong> x + ${b} - ${b} = ${x + b} - ${b}</div>
                        <div class="step"><strong>Step 4:</strong> x = ${x}</div>
                    `;
                } else {
                    equation = `x - ${b} = ${x - b}`;
                    solution = x;
                    steps = `
                        <div class="step"><strong>Step 1:</strong> Isolate x by doing the opposite operation</div>
                        <div class="step"><strong>Step 2:</strong> Since we're subtracting ${b}, we add ${b} to both sides</div>
                        <div class="step"><strong>Step 3:</strong> x - ${b} + ${b} = ${x - b} + ${b}</div>
                        <div class="step"><strong>Step 4:</strong> x = ${x}</div>
                    `;
                }
            } else if (type === 'twoStep') {
                const x = Math.floor(Math.random() * 10) + 1;
                const a = Math.floor(Math.random() * 5) + 2;
                const b = Math.floor(Math.random() * 15) + 1;
                
                equation = `${a}x + ${b} = ${a * x + b}`;
                solution = x;
                steps = `
                    <div class="step"><strong>Step 1:</strong> Subtract ${b} from both sides</div>
                    <div class="step"><strong>Step 2:</strong> ${a}x + ${b} - ${b} = ${a * x + b} - ${b}</div>
                    <div class="step"><strong>Step 3:</strong> ${a}x = ${a * x}</div>
                    <div class="step"><strong>Step 4:</strong> Divide both sides by ${a}</div>
                    <div class="step"><strong>Step 5:</strong> x = ${a * x} ÷ ${a} = ${x}</div>
                `;
            } else {
                const x = Math.floor(Math.random() * 8) + 2;
                const a = Math.floor(Math.random() * 4) + 2;
                const b = Math.floor(Math.random() * 10) + 1;
                
                equation = `${a}(x + ${b}) = ${a * (x + b)}`;
                solution = x;
                steps = `
                    <div class="step"><strong>Step 1:</strong> Distribute ${a} into the parentheses</div>
                    <div class="step"><strong>Step 2:</strong> ${a} × x + ${a} × ${b} = ${a * (x + b)}</div>
                    <div class="step"><strong>Step 3:</strong> ${a}x + ${a * b} = ${a * (x + b)}</div>
                    <div class="step"><strong>Step 4:</strong> Subtract ${a * b} from both sides</div>
                    <div class="step"><strong>Step 5:</strong> ${a}x = ${a * x}</div>
                    <div class="step"><strong>Step 6:</strong> Divide by ${a}: x = ${x}</div>
                `;
            }
            
            return {
                title: "🔢 Solving Equations",
                concept: "An <strong>equation</strong> is like a balance scale - what you do to one side, you must do to the other! We solve for x by isolating it (getting it alone on one side).",
                formula: "Key Rule: Whatever you do to one side, do to the other!",
                steps: steps,
                question: `Solve for x: ${equation}`,
                answer: solution
            };
        }
        
        function generateOrderProblem() {
            const a = Math.floor(Math.random() * 10) + 2;
            const b = Math.floor(Math.random() * 5) + 1;
            const c = Math.floor(Math.random() * 10) + 1;

                    <div class="step"><strong>Step 4:</strong> Rewrite: ${a} + ${b * c}</div>

        function generateSlopeProblem() {
            const types = ['calculate', 'equation', 'findY'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            if (type === 'calculate') {
                const x1 = Math.floor(Math.random() * 8) + 1;
                const y1 = Math.floor(Math.random() * 8) + 1;
                const x2 = x1 + Math.floor(Math.random() * 5) + 1;
                const y2 = y1 + Math.floor(Math.random() * 10) - 3;
                
                const rise = y2 - y1;
                const run = x2 - x1;
                const slope = rise / run;
                const answer = Math.round(slope * 10) / 10;
                
                return {
                    title: "📈 Finding Slope",
                    concept: "<strong>Slope</strong> measures how steep a line is. It's the ratio of rise (vertical change) to run (horizontal change). Slope = rise/run = Δy/Δx",
                    formula: "Slope (m) = (y₂ - y₁) / (x₂ - x₁) = rise/run",
                    steps: `
                        <div class="step"><strong>Given:</strong> Point 1: (${x1}, ${y1}), Point 2: (${x2}, ${y2})</div>
                        <div class="step"><strong>Step 1:</strong> Find the rise: y₂ - y₁ = ${y2} - ${y1} = ${rise}</div>
                        <div class="step"><strong>Step 2:</strong> Find the run: x₂ - x₁ = ${x2} - ${x1} = ${run}</div>
                        <div class="step"><strong>Step 3:</strong> Calculate slope: m = rise/run = ${rise}/${run}</div>
                        <div class="step"><strong>Step 4:</strong> Simplify: m = ${answer}</div>
                        ${slope > 0 ? '<div class="step" style="color: #008000;">Positive slope → line goes UP! ⬈</div>' : ''}
                        ${slope < 0 ? '<div class="step" style="color: #FF0000;">Negative slope → line goes DOWN! ⬊</div>' : ''}
                        ${slope === 0 ? '<div class="step" style="color: #0000FF;">Zero slope → HORIZONTAL line! ⬌</div>' : ''}
                    `,
                    question: `Find the slope between (${x1}, ${y1}) and (${x2}, ${y2}). Round to 1 decimal.`,
                    answer: answer
                };
            } else if (type === 'equation') {
                const m = Math.floor(Math.random() * 6) + 1;
                const b = Math.floor(Math.random() * 10) - 3;
                const questionType = Math.random() > 0.5 ? 'm' : 'b';
                
                if (questionType === 'm') {
                    return {
                        title: "📐 Slope-Intercept Form: y = mx + b",
                        concept: "In <strong>y = mx + b</strong>, 'm' is the slope and 'b' is the y-intercept (where the line crosses the y-axis)",
                        formula: "y = mx + b, where m = slope, b = y-intercept",
                        steps: `
                            <div class="step"><strong>Given equation:</strong> y = ${m}x ${b >= 0 ? '+' : ''} ${b}</div>
                            <div class="step"><strong>Step 1:</strong> Compare to y = mx + b</div>
                            <div class="step"><strong>Step 2:</strong> The number before x is the slope (m)</div>
                            <div class="step"><strong>Step 3:</strong> m = ${m}</div>
                            ${m > 1 ? '<div class="step" style="color: #008000;">This line is fairly steep going up! ⬈</div>' : ''}
                            ${m === 1 ? '<div class="step" style="color: #0000FF;">This is a 45° line going up! ⬈</div>' : ''}
                        `,
                        question: `What is the slope (m) in: y = ${m}x ${b >= 0 ? '+' : ''} ${b}?`,
                        answer: m
                    };
                } else {
                    return {
                        title: "📐 Y-Intercept in y = mx + b",
                        concept: "The <strong>y-intercept (b)</strong> is where the line crosses the y-axis. It's the value of y when x = 0.",
                        formula: "y = mx + b, where m = slope, b = y-intercept",
                        steps: `
                            <div class="step"><strong>Given equation:</strong> y = ${m}x ${b >= 0 ? '+' : ''} ${b}</div>
                            <div class="step"><strong>Step 1:</strong> Compare to y = mx + b</div>
                            <div class="step"><strong>Step 2:</strong> The constant (number alone) is the y-intercept (b)</div>
                            <div class="step"><strong>Step 3:</strong> b = ${b}</div>
                            <div class="step" style="color: #667eea;">The line crosses the y-axis at point (0, ${b})</div>
                        `,
                        question: `What is the y-intercept (b) in: y = ${m}x ${b >= 0 ? '+' : ''} ${b}?`,
                        answer: b
                    };
                }
            } else {
                const m = Math.floor(Math.random() * 4) + 1;
                const b = Math.floor(Math.random() * 8) + 1;
                const x = Math.floor(Math.random() * 6) + 1;
                const answer = m * x + b;
                
                return {
                    title: "🎯 Using Linear Equations",
                    concept: "To find y when you know x, <strong>substitute</strong> x into the equation and solve!",
                    formula: "y = mx + b (substitute the value of x and calculate)",
                    steps: `
                        <div class="step"><strong>Given:</strong> y = ${m}x + ${b}, find y when x = ${x}</div>
                        <div class="step"><strong>Step 1:</strong> Substitute x = ${x} into the equation</div>
                        <div class="step"><strong>Step 2:</strong> y = ${m}(${x}) + ${b}</div>
                        <div class="step"><strong>Step 3:</strong> Multiply: ${m} × ${x} = ${m * x}</div>
                        <div class="step"><strong>Step 4:</strong> Add: y = ${m * x} + ${b} = ${answer}</div>
                        <div class="step" style="color: #667eea;">So the point (${x}, ${answer}) is on this line!</div>
                    `,
                    question: `If y = ${m}x + ${b}, find y when x = ${x}`,
                    answer: answer
                };
            }
        }

        function checkAnswer() {
            const userAnswer = parseFloat(document.getElementById('answer').value);
            
            if (isNaN(userAnswer)) {
                return;
            }
            
            total++;
            
            const feedbackEl = document.getElementById('feedback');
            const starsEl = document.getElementById('stars');
            const submitBtn = document.getElementById('submitBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            if (Math.abs(userAnswer - currentAnswer) < 0.01) {
                correct++;
                streak++;
                
                feedbackEl.innerHTML = `
                    ${encouragement.correct[Math.floor(Math.random() * encouragement.correct.length)]}<br>
                    <span style="font-size: 0.7em;">

                feedbackEl.className = 'feedback correct animate';
                
                let starCount = Math.min(streak, 5);
                starsEl.textContent = '⭐'.repeat(starCount);
                
            } else {

                feedbackEl.innerHTML = `

                    loadingEl.classList.add('hidden');
                    responseEl.innerHTML = `
                        <h3 style="color: #FF0000;">✨ Hot dog! Changes applied! ✨</h3>
                        ${mickeyResponse.split('**Code:**')[0]}
                        <p style="margin-top: 2vmin;"><strong>Applied CSS:</strong></p>
                        <pre style="background: #f0f0f0; padding: 2vmin; border-radius: 1vmin; overflow-x: auto;">${cssCode}</pre>
                        <p style="color: #FF0000; margin-top: 2vmin;"><strong>Gosh!</strong> Don't like it? Just ask me to change it again! 🎨</p>
                    `;
                    responseEl.classList.remove('hidden');
                } else {
                    throw new Error('Could not extract CSS code from response');
                }
                
            } catch (error) {
                console.error('Vibe Coding Error:', error);
                loadingEl.classList.add('hidden');
                responseEl.innerHTML = `
                    <span style="color: #FF0000;">Oops! Mickey had trouble with that.</span><br>
                    <span style="font-size: 0.8em;">Try being more specific, like "Make the background light blue"</span>
                `;
                responseEl.classList.remove('hidden');
            }
        }
    </script>
    <script src="config.js"></script>
</body>
</html>
